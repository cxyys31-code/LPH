<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSO UNMUS Style</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f68b1f;
}

.card {
  width: 90%;
  max-width: 380px;
  margin: 80px auto;
  background: #eee;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.header {
  display: flex;
}

.left-bar {
  width: 80px;
  background: #f68b1f;
  color: white;
  padding: 15px 10px;
  text-align: center;
  font-weight: bold;
}

.right-header {
  flex: 1;
  padding: 20px;
  color: #f68b1f;
  font-weight: bold;
  text-align: right;
}

.form {
  padding: 20px;
}

.input-group {
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 10px;
  border: none;
  border-bottom: 2px solid #f68b1f;
  background: transparent;
  font-size: 16px;
  outline: none;
}

.password-box {
  position: relative;
}

.eye {
  position: absolute;
  right: 10px;
  top: 10px;
  cursor: pointer;
  width: 24px;
  height: 24px;
  stroke: #888;
  fill: none;
  stroke-width: 2;
}

button {
  width: 100%;
  padding: 12px;
  background: #f68b1f;
  border: none;
  color: white;
  font-size: 16px;
  border-radius: 8px;
  margin-top: 10px;
  cursor: pointer;
}

.footer {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  margin-top: 15px;
  color: #f68b1f;
}
</style>
</head>

<body>

<div class="card">
  <div class="header">
    <div class="left-bar">UNMUS</div>
    <div class="right-header">
      myUNMUS<br>single sign-on
    </div>
  </div>

  <div class="form">
    <div class="input-group">
      <input type="text" id="username" placeholder="myUNMUS ID">
    </div>

    <div class="input-group password-box">
      <input type="password" id="password" placeholder="Password">

      <svg id="eyeIcon" class="eye" viewBox="0 0 24 24" onclick="togglePassword()">
        <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
        <circle cx="12" cy="12" r="3"/>
        <line id="slash" x1="3" y1="3" x2="21" y2="21" style="display:none"/>
      </svg>

    </div>

    <button onclick="login()">Lanjutkan</button>

    <div class="footer">
      <span>Lupa kata sandi?</span>
      <span>ID</span>
    </div>
  </div>
</div>

<script>
function togglePassword() {
  const input = document.getElementById("password");
  const slash = document.getElementById("slash");

  if (input.type === "password") {
    input.type = "text";
    slash.style.display = "block";
  } else {
    input.type = "password";
    slash.style.display = "none";
  }
}

function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  const validUser = "310507";
  const validPass = "2026";

  if (user === validUser && pass === validPass) {
    window.location.href = "dashboard.html";
  } else {
    alert("ID atau Password salah!");
  }
}
</script>

</body>
</html>
