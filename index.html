<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSO UNMUS</title>

<style>
:root {
  --grad: linear-gradient(135deg,#ef4444,#f97316);
  --bg:#f3f4f6;
  --line:#fb923c;
  --muted:#9ca3af;
}

body{margin:0;font-family:Arial;background:var(--bg);}

.card{
  width:90%;
  max-width:380px;
  margin:80px auto;
  background:#fff;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.header{display:flex;border-bottom:1px solid #eee;}
.left-bar{
  width:80px;background:var(--grad);
  display:flex;align-items:center;justify-content:center;
}
.left-bar img{width:50px;}
.right-header{
  flex:1;padding:20px;text-align:right;
  color:#ef4444;font-weight:bold;background:#fff7f5;
}

.form{padding:22px;}
.hidden{display:none}


.input-group{position:relative;margin-bottom:22px;}
input{
  width:100%;padding:12px 0;border:none;outline:none;
  background:transparent;font-size:15px;
  border-bottom:2px solid #e5e7eb;
}


.input-group::after{
  content:"";position:absolute;bottom:0;left:0;
  width:0%;height:2px;background:var(--line);
  transition:0.4s ease;
}
.input-group:focus-within::after{width:100%;}

/* MATA */
.eye{
  position:absolute;right:0;top:10px;width:22px;height:22px;
  stroke:var(--muted);fill:none;stroke-width:2;
  cursor:pointer;transition:0.3s;
}
.eye.active{stroke:#f97316;}
.pupil{transition:0.3s;}
.eye.closed .pupil{opacity:0;}
.eyelid{opacity:0;transition:0.3s;}
.eye.closed .eyelid{opacity:1;}

button{
  width:100%;padding:14px;border:none;border-radius:14px;
  background:var(--grad);color:white;font-size:15px;cursor:pointer;
}

.footer{
  display:flex;justify-content:space-between;
  font-size:13px;margin-top:18px;
}
.footer span{color:#ef4444;cursor:pointer;}

.error{
  color:red;
  font-size:12px;
  margin-top:-5px;
  margin-bottom:15px;
  display:none;
}
</style>
</head>

<body>

<div class="card">

  <div class="header">
    <div class="left-bar">
      <img src="logo.png">
    </div>
    <div class="right-header">
      myUNMUS
    </div>
  </div>

  <!-- LOGIN -->
  <div class="form" id="loginBox">

    <div class="input-group">
      <input type="text" id="username" placeholder="myUNMUS ID">
    </div>

    <div class="input-group">
      <input type="password" id="password" placeholder="Password">

      <svg id="eye1" class="eye closed" viewBox="0 0 24 24" onclick="togglePassword()">
        <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
        <circle class="pupil" cx="12" cy="12" r="3"/>
        <line class="eyelid" x1="3" y1="12" x2="21" y2="12"/>
      </svg>
    </div>

    <div id="errorText" class="error">ID atau Password salah</div>

    <button id="loginBtn" onclick="login()">Lanjutkan</button>

    <div class="footer">
      <span id="forgotText" onclick="step1()">Lupa kata sandi?</span>
      <span onclick="toggleLang()" id="langBtn">ID</span>
    </div>
  </div>

  <!-- RESET -->
  <div class="form hidden" id="step1Box">
    <div class="input-group">
      <input type="text" id="resetId" placeholder="Masukkan ID">
    </div>
    <button id="nextBtn" onclick="step2()">Lanjut</button>
    <div class="footer">
      <span id="back1" onclick="backLogin()">← Kembali</span>
    </div>
  </div>

  <div class="form hidden" id="step2Box">
    <div id="infoText"></div>
    <div class="input-group">
      <input type="text" placeholder="Kode verifikasi">
    </div>
    <button id="verifyBtn" onclick="step3()">Verifikasi</button>
    <div class="footer">
      <span id="back2" onclick="step1()">← Kembali</span>
    </div>
  </div>

  <div class="form hidden" id="step3Box">
    <div class="input-group">
      <input type="password" placeholder="Password baru">
    </div>
    <button id="saveBtn" onclick="backLogin()">Simpan Password</button>
  </div>

</div>

<script>
const users={
 "000":{pass:"000",email:"a@gmail.com"},
 "123":{pass:"321",email:"b@gmail.com"},
 "999":{pass:"999",email:"c@gmail.com"},
 "777":{pass:"777",email:"d@gmail.com"}
};

function show(id){
  document.querySelectorAll(".form").forEach(e=>e.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

function step1(){show("step1Box")}

function step2(){
  const id=resetId.value;
  if(users[id]){
    infoText.innerHTML="Kode dikirim ke email<br><b>"+users[id].email+"</b>";
    show("step2Box");
  }
}

function step3(){show("step3Box")}
function backLogin(){show("loginBox")}

function login(){
  const u=username.value;
  const p=password.value;

  if(users[u] && users[u].pass===p){
    window.location.href="dashboard.html";
  } else {
    errorText.style.display="block";
  }
}


function togglePassword(){
  password.type=password.type==="password"?"text":"password";
  eye1.classList.toggle("closed");
  eye1.classList.toggle("active");
}

let lang="ID";
function toggleLang(){
  lang=lang==="ID"?"EN":"ID";
  langBtn.innerText=lang;

  loginBtn.innerText=lang==="EN"?"Continue":"Lanjutkan";
  forgotText.innerText=lang==="EN"?"Forgot password?":"Lupa kata sandi?";
  nextBtn.innerText=lang==="EN"?"Next":"Lanjut";
  verifyBtn.innerText=lang==="EN"?"Verify":"Verifikasi";
  saveBtn.innerText=lang==="EN"?"Save Password":"Simpan Password";
  back1.innerText=lang==="EN"?"← Back":"← Kembali";
  back2.innerText=lang==="EN"?"← Back":"← Kembali";

  errorText.innerText=lang==="EN"
    ?"Wrong ID or Password"
    :"ID atau Password salah";
}
</script>

</body>
</html>
