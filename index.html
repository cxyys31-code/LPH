<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSO UNMUS</title>

<style>
:root {
  --grad: linear-gradient(135deg, #ef4444, #f97316);
  --bg: #f3f4f6;
  --card: #ffffff;
  --muted: #9ca3af;
  --line: #fb923c;
}

body {
  margin: 0;
  font-family: Arial;
  background: var(--bg);
}

/* CARD */
.card {
  width: 90%;
  max-width: 380px;
  margin: 80px auto;
  background: var(--card);
  border-radius: 20px;
  overflow: hidden;

  box-shadow:
    0 10px 25px rgba(0,0,0,0.08),
    0 0 20px rgba(251,146,60,0.2);
}

/* HEADER */
.header {
  display: flex;
  border-bottom: 1px solid #eee;
}

.left-bar {
  width: 80px;
  background: var(--grad);
  color: white;
  padding: 15px 10px;
  text-align: center;
  font-weight: bold;
}

.right-header {
  flex: 1;
  padding: 20px;
  text-align: right;
  color: #ef4444;
  font-weight: bold;
  background: #fff7f5;
}

/* FORM */
.form {
  padding: 22px;
}

/* INPUT */
.input-group {
  margin-bottom: 22px;
}

input {
  width: 100%;
  padding: 12px 0;
  border: none;
  outline: none;
  background: transparent;
  font-size: 15px;

  border-bottom: 2px solid #e5e7eb;
  transition: 0.25s;
}

input:focus {
  border-bottom: 2px solid var(--line);
  box-shadow: 0 4px 8px -4px rgba(251,146,60,0.7);
}

input::placeholder {
  color: var(--muted);
}

/* PASSWORD */
.password-box {
  position: relative;
}

.eye {
  position: absolute;
  right: 0;
  top: 12px;
  width: 22px;
  height: 22px;
  stroke: #9ca3af;
  fill: none;
  stroke-width: 2;
  cursor: pointer;
  transition: 0.3s;
}

.eye.active {
  stroke: #f97316;
  filter: drop-shadow(0 0 4px rgba(249,115,22,0.7));
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 14px;
  background: var(--grad);
  color: white;
  font-size: 15px;
  cursor: pointer;
}

/* FOOTER */
.footer {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  margin-top: 18px;
}

.footer span {
  color: #ef4444;
  cursor: pointer;
}

.info {
  font-size: 13px;
  color: #6b7280;
  margin-bottom: 15px;
}

.hidden { display: none; }
</style>
</head>

<body>

<div class="card">

  <div class="header">
    <div class="left-bar">UNMUS</div>
    <div class="right-header">
      myUNMUS<br>single sign-on
    </div>
  </div>

  <!-- LOGIN -->
  <div class="form" id="loginBox">
    <div class="input-group">
      <input type="text" placeholder="myUNMUS ID">
    </div>

    <div class="input-group password-box">
      <input type="password" id="password" placeholder="Password">

      <svg id="eye1" class="eye" viewBox="0 0 24 24" onclick="togglePassword()">
        <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
        <circle cx="12" cy="12" r="3"/>
        <line id="slash1" x1="3" y1="3" x2="21" y2="21"/>
      </svg>
    </div>

    <button onclick="step1()">Lanjutkan</button>

    <div class="footer">
      <span onclick="step1()">Lupa kata sandi?</span>
      <span onclick="toggleLang()" id="langBtn">ID</span>
    </div>
  </div>

  <!-- RESET -->
  <div class="form hidden" id="step1Box">
    <div class="input-group">
      <input type="text" placeholder="Masukkan ID">
    </div>

    <button onclick="step2()">Lanjut</button>

    <div class="footer">
      <span onclick="backLogin()">← Kembali</span>
    </div>
  </div>

  <div class="form hidden" id="step2Box">
    <div class="info" id="infoText">
      Masukkan kode verifikasi yang telah dikirim ke email<br>
      <b>ndramy31@gmail.com</b>
    </div>

    <div class="input-group">
      <input type="text" placeholder="Kode verifikasi">
    </div>

    <button onclick="step3()">Verifikasi</button>
  </div>

  <div class="form hidden" id="step3Box">
    <div class="input-group password-box">
      <input type="password" id="newPass" placeholder="Password baru">

      <svg id="eye2" class="eye" viewBox="0 0 24 24" onclick="toggleNewPassword()">
        <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
        <circle cx="12" cy="12" r="3"/>
        <line id="slash2" x1="3" y1="3" x2="21" y2="21"/>
      </svg>
    </div>

    <button onclick="backLogin()">Simpan Password</button>
  </div>

</div>

<script>
function switchBox(id){
  document.querySelectorAll(".form").forEach(f=>f.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

function step1(){ switchBox("step1Box"); }
function step2(){ switchBox("step2Box"); }
function step3(){ switchBox("step3Box"); }
function backLogin(){ switchBox("loginBox"); }

/* EYE */
function togglePassword(){
  const i = password;
  const eye = eye1;
  const slash = slash1;

  if(i.type==="password"){
    i.type="text";
    eye.classList.add("active");
    slash.style.opacity="0";
  } else {
    i.type="password";
    eye.classList.remove("active");
    slash.style.opacity="1";
  }
}

function toggleNewPassword(){
  const i = newPass;
  const eye = eye2;
  const slash = slash2;

  if(i.type==="password"){
    i.type="text";
    eye.classList.add("active");
    slash.style.opacity="0";
  } else {
    i.type="password";
    eye.classList.remove("active");
    slash.style.opacity="1";
  }
}

/* LANGUAGE */
let lang="ID";
function toggleLang(){
  lang = lang==="ID"?"EN":"ID";
  langBtn.innerText = lang;

  document.getElementById("infoText").innerHTML =
    lang==="EN"
    ? "Enter verification code sent to email<br><b>ndramy31@gmail.com</b>"
    : "Masukkan kode verifikasi yang telah dikirim ke email<br><b>ndramy31@gmail.com</b>";
}
</script>

</body>
</html>
