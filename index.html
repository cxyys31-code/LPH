      <!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>myUNMUS SSO</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5820b;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 340px;
      background: #e9e9e9;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .top {
      display: flex;
    }

    .left {
      width: 90px;
      background: #f5820b;
      color: white;
      padding: 15px 10px;
      text-align: center;
      position: relative;
    }

    .left h3 {
      margin: 0;
      font-size: 14px;
    }

    .circle {
      width: 60px;
      height: 60px;
      background: #e9e9e9;
      border-radius: 50%;
      position: absolute;
      bottom: -30px;
      left: 50%;
      transform: translateX(-50%);
    }

    .right {
      flex: 1;
      padding: 20px;
      text-align: right;
    }

    .right h2 {
      margin: 0;
      color: #f5820b;
      font-size: 18px;
    }

    .right span {
      font-size: 12px;
      color: #999;
    }

    .content {
      padding: 40px 20px 20px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group input {
      width: 100%;
      border: none;
      border-bottom: 2px solid #ccc;
      padding: 10px;
      background: transparent;
      font-size: 15px;
      outline: none;
    }

    .input-group input:focus {
      border-color: #f5820b;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: #f5820b;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      margin-top: 15px;
      font-size: 13px;
      color: #f5820b;
    }

    .footer a {
      text-decoration: none;
      color: #f5820b;
    }

    .copyright {
      text-align: center;
      font-size: 12px;
      color: #777;
      padding: 10px 0 15px;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="top">
      <div class="left">
        <h3>UNMUS</h3>
        <div class="circle"></div>
      </div>

      <div class="right">
        <h2>myUNMUS</h2>
        <span>single sign-on</span>
      </div>
    </div>

    <div class="content">
      <div class="input-group">
        <input type="text" placeholder="myUNMUS ID">
      </div>

      <button class="btn">Lanjutkan</button>

      <div class="footer">
        <a href="#">Lupa kata sandi?</a>
        <a href="#">ID</a>
      </div>
    </div>

    <div class="copyright">
      © 2026 Universitas Musamus Merauke v2.3.7
    </div>
  </div>

</body>
</html>
