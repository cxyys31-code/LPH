<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSO UNMUS</title>

<style>
:root {
  --grad: linear-gradient(135deg,#ef4444,#f97316);
  --bg:#f3f4f6;
  --line:#fb923c;
  --muted:#9ca3af;
}

body{margin:0;font-family:Arial;background:var(--bg);}

/* CARD */
.card{
  width:90%;
  max-width:380px;
  margin:80px auto;
  background:#fff;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* HEADER */
.header{display:flex;border-bottom:1px solid #eee;}
.left-bar{
  width:80px;background:var(--grad);
  display:flex;align-items:center;justify-content:center;
}
.left-bar img{width:50px;}
.right-header{
  flex:1;padding:20px;text-align:right;
  color:#ef4444;font-weight:bold;background:#fff7f5;
}

/* FORM */
.form{padding:22px;}
.hidden{display:none}

/* INPUT */
.input-group{position:relative;margin-bottom:22px;}
input{
  width:100%;padding:12px 0;border:none;outline:none;
  background:transparent;font-size:15px;
  border-bottom:2px solid #e5e7eb;
}

/* LINE ANIMATION */
.input-group::after{
  content:"";position:absolute;bottom:0;left:0;
  width:0%;height:2px;background:var(--line);
  transition:0.4s ease;
}
.input-group:focus-within::after{width:100%;}

/* EYE */
.eye{
  position:absolute;right:0;top:10px;width:22px;height:22px;
  stroke:#9ca3af;fill:none;stroke-width:2;
  cursor:pointer;transition:0.3s;
}
.eye.active{stroke:#f97316;}
.pupil{transition:0.3s;}
.eye.closed .pupil{opacity:0;}
.eyelid{opacity:0;transition:0.3s;}
.eye.closed .eyelid{opacity:1;}

/* BUTTON */
button{
  width:100%;padding:14px;border:none;border-radius:14px;
  background:var(--grad);color:white;font-size:15px;cursor:pointer;
}

/* FOOTER */
.footer{
  display:flex;justify-content:space-between;
  font-size:13px;margin-top:18px;
}
.footer span{color:#ef4444;cursor:pointer;}

.error{color:red;font-size:12px;display:none;}
.info{font-size:13px;color:#6b7280;margin-bottom:10px;}
</style>
</head>

<body>

<div class="card">

  <div class="header">
    <div class="left-bar">
      <img src="logo.png">
    </div>
    <div class="right-header">
      myUNMUS<br><span id="titleText">single sign-on</span>
    </div>
  </div>

  <!-- LOGIN -->
  <div class="form" id="loginBox">

    <div class="input-group">
      <input type="text" id="username" placeholder="myUNMUS ID">
    </div>

    <div class="input-group">
      <input type="password" id="password" placeholder="Password">

      <svg id="eye1" class="eye" viewBox="0 0 24 24" onclick="togglePassword()">
        <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
        <circle class="pupil" cx="12" cy="12" r="3"/>
        <line class="eyelid" x1="3" y1="12" x2="21" y2="12"/>
      </svg>
    </div>

    <div id="errorText" class="error">ID atau Password salah</div>

    <button id="loginBtn" onclick="login()">Lanjutkan</button>

    <div class="footer">
      <span id="forgotText" onclick="step1()">Lupa kata sandi?</span>
      <span onclick="toggleLang()" id="langBtn">ID</span>
    </div>
  </div>

  <!-- STEP 1 -->
  <div class="form hidden" id="step1Box">
    <div class="input-group">
      <input type="text" id="resetId" placeholder="Masukkan ID">
    </div>

    <button id="nextBtn" onclick="step2()">Lanjut</button>

    <div class="footer">
      <span id="back1" onclick="backLogin()">← Kembali</span>
    </div>
  </div>

  <!-- STEP 2 -->
  <div class="form hidden" id="step2Box">
    <div class="info" id="infoText">
      Masukkan kode verifikasi yang dikirim ke email<br>
      <b>ndramy31@gmail.com</b>
    </div>

    <div class="input-group">
      <input type="text" id="kode" placeholder="Kode verifikasi">
    </div>

    <button id="verifyBtn" onclick="step3()">Verifikasi</button>

    <div class="footer">
      <span id="back2" onclick="step1()">← Kembali</span>
    </div>
  </div>

  <!-- STEP 3 -->
  <div class="form hidden" id="step3Box">
    <div class="input-group">
      <input type="password" id="newPass" placeholder="Password baru">

      <svg id="eye2" class="eye" viewBox="0 0 24 24" onclick="toggleNewPassword()">
        <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
        <circle class="pupil" cx="12" cy="12" r="3"/>
        <line class="eyelid" x1="3" y1="12" x2="21" y2="12"/>
      </svg>
    </div>

    <button id="saveBtn" onclick="backLogin()">Simpan Password</button>
  </div>

  <!-- DASHBOARD -->
  <div class="form hidden" id="dashboard">
    <h3 id="welcomeText">Selamat datang 👋</h3>
    <button onclick="backLogin()">Logout</button>
  </div>

</div>

<script>

/* NAVIGATION */
function show(id){
  document.querySelectorAll(".form").forEach(f=>f.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

function step1(){show("step1Box")}
function step2(){show("step2Box")}
function step3(){show("step3Box")}
function backLogin(){show("loginBox")}

/* LOGIN */
function login(){
  if(username.value==="310507" && password.value==="2026"){
    errorText.style.display="none";
    show("dashboard");
  } else {
    errorText.style.display="block";
  }
}

/* EYE */
function togglePassword(){
  password.type = password.type==="password"?"text":"password";
  eye1.classList.toggle("active");
  eye1.classList.toggle("closed");
}

function toggleNewPassword(){
  newPass.type = newPass.type==="password"?"text":"password";
  eye2.classList.toggle("active");
  eye2.classList.toggle("closed");
}

/* LANGUAGE */
let lang="ID";
function toggleLang(){
  lang = lang==="ID"?"EN":"ID";
  langBtn.innerText = lang;

  if(lang==="EN"){
    loginBtn.innerText="Continue";
    forgotText.innerText="Forgot password?";
    nextBtn.innerText="Next";
    verifyBtn.innerText="Verify";
    saveBtn.innerText="Save Password";
    back1.innerText="← Back";
    back2.innerText="← Back";
    welcomeText.innerText="Welcome 👋";

    errorText.innerText="Wrong ID or Password";

    infoText.innerHTML="Enter verification code sent to email<br><b>ndramy31@gmail.com</b>";

  } else {
    loginBtn.innerText="Lanjutkan";
    forgotText.innerText="Lupa kata sandi?";
    nextBtn.innerText="Lanjut";
    verifyBtn.innerText="Verifikasi";
    saveBtn.innerText="Simpan Password";
    back1.innerText="← Kembali";
    back2.innerText="← Kembali";
    welcomeText.innerText="Selamat datang 👋";

    errorText.innerText="ID atau Password salah";

    infoText.innerHTML="Masukkan kode verifikasi yang dikirim ke email<br><b>ndramy31@gmail.com</b>";
  }
}

</script>

</body>
</html>
