<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Kuliah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        unmus: {
                            orange: '#FF7D00',
                            light: '#FFF5EB',
                            dark: '#E67000',
                        },
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .bg-batik {
                background-image: url('https://www.transparenttextures.com/patterns/batiken.png');
                background-size: 200px;
            }
            .card-shadow {
                box-shadow: 0 4px 15px rgba(255, 125, 0, 0.1);
            }
            .icon-box {
                width: 45px;
                height: 45px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 10px;
            }
        }
    </style>
</head>
<body class="bg-batik bg-unmus-light min-h-screen font-sans">

    <div class="container mx-auto p-4 max-w-2xl">
        
        <div class="bg-white rounded-2xl p-6 card-shadow border-t-4 border-unmus-orange">
            <div class="flex items-center gap-3 mb-6">
                <i class="fa fa-calendar text-unmus-orange text-2xl"></i>
                <h3 class="text-xl font-bold text-gray-700">Jadwal Kuliah</h3>
            </div>
            
            <div class="space-y-5">

                <!-- Senin -->
                <div class="border-b border-gray-100 pb-4">
                    <h4 class="font-bold text-unmus-orange text-lg mb-3 flex items-center gap-2">
                        <i class="fa fa-sun-o"></i> Senin
                    </h4>
                    <div class="space-y-3">
                        <div class="flex items-start gap-4 p-4 rounded-xl bg-unmus-light">
                            <div class="icon-box bg-blue-100 text-blue-600 mt-1">
                                <i class="fa fa-lightbulb-o"></i>
                            </div>
                            <div class="flex-grow">
                                <h4 class="font-semibold text-gray-800">Filsafat Teknologi <span class="text-xs bg-orange-200 text-orange-800 px-2 py-0.5 rounded-full">Kelas A</span></h4>
                                <p class="text-sm text-unmus-orange font-bold mt-1">10:30 - 13:50</p>
                                <p class="text-sm text-gray-500 mt-1"><i class="fa fa-map-marker"></i> Aula </p>
                                <p class="text-sm text-gray-600 mt-1"><i class="fa fa-user"></i> Gustavo Fring</p>
                                <p class="text-sm text-gray-600"><i class="fa fa-phone"></i> +62 822-9263-9988</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Rabu -->
                <div class="border-b border-gray-100 pb-4">
                    <h4 class="font-bold text-unmus-orange text-lg mb-3 flex items-center gap-2">
                        <i class="fa fa-book"></i> Rabu
                    </h4>
                    <div class="space-y-3">
                        <div class="flex items-start gap-4 p-4 rounded-xl bg-unmus-light">
                            <div class="icon-box bg-green-100 text-green-600 mt-1">
                                <i class="fa fa-flask"></i>
                            </div>
                            <div class="flex-grow">
                                <h4 class="font-semibold text-gray-800">Kimia Murni <span class="text-xs bg-orange-200 text-orange-800 px-2 py-0.5 rounded-full">Kelas B</span></h4>
                                <p class="text-sm text-unmus-orange font-bold mt-1">08:00 - 10:30</p>
                                <p class="text-sm text-gray-500 mt-1"><i class="fa fa-map-marker"></i> Lab 1.2</p>
                                <p class="text-sm text-gray-600 mt-1"><i class="fa fa-user"></i> Walter White</p>
                                <p class="text-sm text-gray-600"><i class="fa fa-phone"></i> +62 821-3116-2100</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Kamis -->
                <div>
                    <h4 class="font-bold text-unmus-orange text-lg mb-3 flex items-center gap-2">
                        <i class="fa fa-flask"></i> Kamis
                    </h4>
                    <div class="space-y-3">
                        <div class="flex items-start gap-4 p-4 rounded-xl bg-unmus-light">
                            <div class="icon-box bg-purple-100 text-purple-600 mt-1">
                                <i class="fa fa-balance-scale"></i>
                            </div>
                            <div class="flex-grow">
                                <h4 class="font-semibold text-gray-800">Sastra Hukum <span class="text-xs bg-orange-200 text-orange-800 px-2 py-0.5 rounded-full">Kelas C</span></h4>
                                <p class="text-sm text-unmus-orange font-bold mt-1">10:30 - 13:00</p>
                                <p class="text-sm text-gray-500 mt-1"><i class="fa fa-map-marker"></i> Ruang 1.4</p>
                                <p class="text-sm text-gray-600 mt-1"><i class="fa fa-user"></i> Saul Goodman</p>
                                <p class="text-sm text-gray-600"><i class="fa fa-phone"></i> +62 812-1351-2452</p>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

    </div>

</body>
</html>
