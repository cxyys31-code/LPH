<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard UNMUS</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f2f2f2;
}

/* HEADER */
.header {
  background: #333;
  color: white;
  padding: 15px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.header h2 {
  margin: 0;
  font-size: 16px;
}

/* CONTENT */
.container {
  padding: 15px;
}

.welcome {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

/* CARD */
.card {
  display: flex;
  margin-bottom: 15px;
  border-radius: 10px;
  overflow: hidden;
  color: white;
}

.card .left {
  width: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  background: rgba(0,0,0,0.1);
}

.card .right {
  flex: 1;
  padding: 15px;
}

.status {
  font-size: 14px;
  opacity: 0.8;
}

.value {
  font-size: 20px;
  font-weight: bold;
  margin-top: 5px;
}

/* WARNA */
.blue { background: #4aa3c0; }
.green { background: #1f9d8a; }
.orange { background: #e6a04b; }
.red { background: #e05555; }
</style>
</head>

<body>

<div class="header">
  <h2>Universitas Musamus Merauke</h2>
  ☰
</div>

<div class="container">

  <div class="welcome">
    <h3>Selamat Datang <b>INDRA MARYANTO</b></h3>
  </div>

  <div class="card blue">
    <div class="left">🎓</div>
    <div class="right">
      <div class="status">STATUS AKADEMIK</div>
      <div class="value">Aktif</div>
    </div>
  </div>

  <div class="card green">
    <div class="left">💵</div>
    <div class="right">
      <div class="status">STATUS BAYAR</div>
      <div class="value">Lunas</div>
    </div>
  </div>

  <div class="card orange">
    <div class="left">👤</div>
    <div class="right">
      <div class="status">DOSEN PA</div>
      <div class="value">RACHMAT, S.KOM., M.KOM.</div>
    </div>
  </div>

  <div class="card red">
    <div class="left">📋</div>
    <div class="right">
      <div class="status">JATAH SKS</div>
      <div class="value">24</div>
    </div>
  </div>

</div>

</body>
</html>
