<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<script>
if(!localStorage.getItem("login")){
  window.location.href = "index.html";
}
</script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:white;
  text-align:center;
}

/* BANNER */
.banner{
  width:100%;
  background: linear-gradient(90deg, orange, darkorange);
  color:white;
  padding:6px 0;
  overflow:hidden;
  cursor:pointer;
  font-size:13px;
}

.banner span{
  display:inline-block;
  white-space:nowrap;
  animation: jalan 10s linear infinite;
}

@keyframes jalan{
  from{ transform:translateX(100%); }
  to{ transform:translateX(-100%); }
}

/* PROFIL */
.profile{
  width:110px;
  height:110px;
  border-radius:50%;
  background:#ccc;
  margin:30px auto;
  cursor:pointer;
  border:1px solid #ccc;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:repeat(2,100px);
  gap:15px;
  justify-content:center;
}

/* KOTAK */
.card{
  width:100px;
  height:80px;
  background:#f5f5f5;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:0.2s;
  border:1px solid #ccc;
}

.card:hover{
  transform:scale(1.05);
}

.card span{
  font-size:11px;
}
</style>
</head>

<body>

<!-- BANNER -->
<div class="banner" onclick="go('pengumuman.html')">
  <span>PEMBERITAHUAN! Klik di sini untuk info terbaru</span>
</div>

<!-- FOTO PROFIL -->
<div class="profile" onclick="go('profil.html')"></div>

<!-- MENU -->
<div class="container">
  <div class="card" onclick="go('dosen.html')">
    <span>Dosen PA</span>
  </div>

  <div class="card" onclick="go('sks.html')">
    <span>Pembayaran</span>
  </div>

  <div class="card" onclick="go('krs.html')">
    <span>Jadwal</span>
  </div>

  <div class="card" onclick="go('revisi.html')">
    <span>KRS</span>
  </div>

  <div class="card" onclick="go('total.html')">
    <span>Total SKS</span>
  </div>

  <div class="card" onclick="go('ipk.html')">
    <span>IPK</span>
  </div>
</div>

<script>
function go(page){
  window.location.href = page;
}
</script>

</body>
</html>
