<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: repeating-linear-gradient(
    45deg,
    #eee,
    #eee 10px,
    #ddd 10px,
    #ddd 20px
  );
  text-align: center;
}

/* FOTO PROFIL */
.profile {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: #ccc;
  margin: 40px auto;
  cursor: pointer;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(2, 150px);
  gap: 30px;
  justify-content: center;
}

/* KOTAK */
.card {
  width: 150px;
  height: 120px;
  background: #ccc;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
}

/* TEXT */
.card span {
  font-size: 12px;
}
</style>
</head>

<body>

<!-- FOTO PROFIL -->
<div class="profile" onclick="go('profil.html')"></div>

<!-- MENU -->
<div class="container">
  <div class="card" onclick="go('dosen.html')">
    <span>Dosen PA</span>
  </div>

  <div class="card" onclick="go('sks.html')">
    <span>Jatah SKS</span>
  </div>

  <div class="card" onclick="go('krs.html')">
    <span>Periode KRS</span>
  </div>

  <div class="card" onclick="go('revisi.html')">
    <span>Revisi KRS</span>
  </div>

  <div class="card" onclick="go('total.html')">
    <span>Total SKS</span>
  </div>

  <div class="card" onclick="go('ipk.html')">
    <span>IPK</span>
  </div>
</div>

<script>
function go(page){
  window.location.href = page;
}
</script>

</body>
</html>
