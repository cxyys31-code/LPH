<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard UNMUS</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f3f4f6;
}

.container{
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 20px rgba(0,0,0,0.1);
  margin-top:20px;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#ef4444;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
  <h2>Dashboard UNMUS</h2>

  <div class="card">
    <p><b>Selamat datang 👋</b></p>
    <p>Anda berhasil login ke sistem SSO UNMUS</p>
  </div>

  <button onclick="logout()">Logout</button>
</div>

<script>
function logout(){
  window.location.href = "index.html";
}
</script>

</body>
</html>
