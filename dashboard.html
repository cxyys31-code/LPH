<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<script>
if(!localStorage.getItem("login")){
  window.location.href = "index.html";
}
</script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:white;
  text-align:center;
}

/* BANNER */
.banner{
  width:100%;
  background: linear-gradient(90deg, orange, darkorange);
  color:white;
  padding:6px 0;
  overflow:hidden;
  cursor:pointer;
  font-size:13px;
}

.banner span{
  display:inline-block;
  white-space:nowrap;
  animation: jalan 10s linear infinite;
}

@keyframes jalan{
  from{ transform:translateX(100%); }
  to{ transform:translateX(-100%); }
}

/* TEXT ATAS */
.welcome{
  margin-top:15px;
  font-size:18px;
  font-weight:bold;
}

/* PROFIL */
.profile{
  width:110px;
  height:110px;
  border-radius:50%;
  .profile{
  width:110px;
  height:110px;
  border-radius:50%;
  margin:10px auto;
  cursor:pointer;
  border:1px solid #ccc;

  background-image:url('JessePinkman.png');
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

/* NAMA */
.name{
  font-size:16px;
  font-weight:bold;
  margin-bottom:20px;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:repeat(3,90px);
  gap:20px;
  justify-content:center;
}

/* ITEM */
.item{
  text-align:center;
  cursor:pointer;
}

/* KOTAK */
.card{
  width:90px;
  height:70px;
  background:#f5f5f5;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid #ccc;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.05);
}

/* TEKS */
.label{
  margin-top:5px;
  font-size:11px;
}
</style>
</head>

<body>

<!-- BANNER -->
<div class="banner" onclick="go('pengumuman.html')">
  <span>PENGUMUMAN!!!</span>
</div>

<!-- TEXT ATAS -->
<div class="welcome">SELAMAT DATANG</div>

<!-- FOTO PROFIL -->
<div class="profile" onclick="go('profil.html')">
</div>


<!-- NAMA -->
<div class="name">JESSE PINKMAN</div>

<!-- MENU -->
<div class="container">
  
  <div class="item" onclick="go('dosen.html')">
    <div class="card"></div>
    <div class="label">Dosen PA</div>
  </div>

  <div class="item" onclick="go('akademik.html')">
    <div class="card"></div>
    <div class="label">Akademik</div>
  </div>

  <div class="item" onclick="go('pembayaran.html')">
    <div class="card"></div>
    <div class="label">Pembayaran</div>
  </div>

  <div class="item" onclick="go('krs.html')">
    <div class="card"></div>
    <div class="label">KRS</div>
  </div>

  <div class="item" onclick="go('khs.html')">
    <div class="card"></div>
    <div class="label">KHS</div>
  </div>

  <div class="item" onclick="go('jadwal.html')">
    <div class="card"></div>
    <div class="label">Jadwal</div>
  </div>

  <div class="item" onclick="go('vc.html')">
    <div class="card"></div>
    <div class="label">Virtual Class</div>
  </div>

  <div class="item" onclick="go('fs.html')">
    <div class="card"></div>
    <div class="label">File Sharing</div>
  </div>

  <div class="item" onclick="go('ipk.html')">
    <div class="card"></div>
    <div class="label">IP komulatif</div>
  </div>

</div>

<script>
function go(page){
  window.location.href = page;
}
</script>

</body>
</html>
